<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Registration</title>
  <link rel="stylesheet" href="2.lawyer_reg.css">
</head>
<body>
  <div id="registration-container">
    <h2>User Registration</h2>
    <form id="registrationForm">
      <label for="userType" class="same">Registering as</label>
      <select id="userType" name="userType" required>
        <option value="">Select</option>
        <option value="lawyer">Lawyer</option>
        <option value="client">Client</option>
      </select>

      <label class="same">Name</label>
      <div class="name_container">
        <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
        <input type="text" id="MiddleName" name="MiddleName" placeholder="Middle Name" required>
        <input type="text" id="LastName" name="LastName" placeholder="Last Name" required>
      </div>

      <label for="email" class="same">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone" class="same">Phone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="password" class="same">Password</label>
      <input type="password" id="password" name="password" required>

      <label for="confirmPassword" class="same">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required>

      <!-- Lawyer-specific fields -->
      <div id="lawyerFields" style="display: none;">
        <label for="barCouncilNumber" class="same">Bar Council Number</label>
        <input type="text" id="barCouncilNumber" name="barCouncilNumber">

        <div class="checkbox-container">
          <input type="checkbox" id="legalPractitioner" name="legalPractitioner">
          <label for="legalPractitioner">I am a licensed legal practitioner</label>
        </div>
      </div>

      <input type="submit" value="Register">
    </form>
  </div>

  <script>
    const userTypeSelect = document.getElementById("userType");
    const lawyerFields = document.getElementById("lawyerFields");

    userTypeSelect.addEventListener("change", function () {
      if (this.value === "lawyer") {
        lawyerFields.style.display = "block";
      } else {
        lawyerFields.style.display = "none";
      }
    });

    document.getElementById("registrationForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const formData = new FormData(this);
      const password = formData.get('password');
      const confirmPassword = formData.get('confirmPassword');

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      const response = await fetch('http://localhost:5000/register', {
        method: 'POST',
        body: formData
      });

      const result = await response.json();

      if (response.status === 201) {
        alert("Registration successful! Redirecting to login...");
        window.location.href = "1.user_login.html";
      } else {
        alert(result.message || "Registration failed. Try again.");
      }
    });
  </script>
</body>
</html>
