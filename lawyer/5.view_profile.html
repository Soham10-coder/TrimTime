<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Profile</title>
  <link rel="stylesheet" href="4.lawer_profile.css" />
</head>
<body>
  <div class="container">
    <h2>Your Profile</h2>
    <div class="profile-details">
      <p><strong>Achievements:</strong> <span id="achievements">Loading...</span></p>
      <p><strong>Years of Experience:</strong> <span id="experience">Loading...</span></p>
      <p><strong>Specialization:</strong> <span id="specialization">Loading...</span></p>
      <p><strong>Certifications:</strong> <span id="certifications">Loading...</span></p>
      <p><strong>Graduation Certificates:</strong> <span id="graduationCertificates">Loading...</span></p>
      <p><strong>Profile Picture:</strong> <img id="profilePic" src="" alt="Profile Picture" style="width:100px;height:100px;" /></p>
    </div>

    <a href="4.lawyer_profile.html" class="edit-profile-btn">Edit Profile</a>
  </div>

  <script>
    
    const userData = JSON.parse(localStorage.getItem('lawyerData')) || {};

 
    document.getElementById('achievements').textContent = userData.achievements || ' ';
    document.getElementById('experience').textContent = userData.experience || '';
    document.getElementById('specialization').textContent = userData.specialization || '';
    document.getElementById('certifications').textContent = userData.certifications || '';
    document.getElementById('graduationCertificates').textContent = userData.graduationCertificates || '';
    
    if (userData.profilePic) {
      document.getElementById('profilePic').src = userData.profilePic;
    }
  </script>
</body>
</html>
