<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client List - LegalConnect</title>
  <link rel="stylesheet" href="7.lawyer_message.css" />
</head>
<body>
  <div class="container">
    <h2>Select a Client to Chat</h2>
    <ul class="client-list">
      <li><a href="7.1.lawyer_message.html?client=sohambagade">Soham Bagade</a></li>
      <li><a href="7.1.lawyer_message.html?client=shriee">Shreedhar Badger</a></li>
      <li><a href="7.1.lawyer_message.html?client=ketan">Ketan Patil</a></li>
      <li><a href="7.1.lawyer_message.html?client=revati">Revati Patil</a></li>
    </ul>
  </div>

  <script>
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function() {
        const clientName = this.textContent;
        window.location.href = `7.1.lawyer_message.html?client=${encodeURIComponent(clientName)}`;
      });
    });
  </script>
</body>
</html>
