version: "3.9"

services:
  backend:
    image: ${REGISTRY}/trimtime-backend:${IMAGE_TAG}
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - uploads_volume:/app/uploads
    restart: always

  frontend:
    image: ${REGISTRY}/trimtime-frontend:${IMAGE_TAG}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_volume:
