services:
  mongo:
    image: mongo:6.0
    container_name: trimtime-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: ${REGISTRY}/trimtime-backend:${IMAGE_TAG}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/}
      - SECRET_KEY=${SECRET_KEY:-trimtime-secret-key-production-123}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-trimtime-jwt-secret-key-123}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY:-trimtime-jwt-refresh-secret-901234}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASS=${GMAIL_PASS}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USE_TLS=${MAIL_USE_TLS}
      - MAIL_USE_SSL=${MAIL_USE_SSL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
    ports:
      - "5000:5000"
    volumes:
      - uploads_volume:/app/uploads
    depends_on:
      - mongo
    restart: always

  frontend:
    image: ${REGISTRY}/trimtime-frontend:${IMAGE_TAG}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_volume:
  mongo_data:
