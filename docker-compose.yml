services:
  backend:
    image: ${REGISTRY}/trimtime-backend:${IMAGE_TAG}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://localhost:27017/}
      - SECRET_KEY=${SECRET_KEY:-trimtime-secret-key-production-123}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-trimtime-jwt-secret-key-123}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY:-trimtime-jwt-refresh-secret-key-123}
    ports:
      - "5000:5000"
    volumes:
      - uploads_volume:/app/uploads
    restart: always

  frontend:
    image: ${REGISTRY}/trimtime-frontend:${IMAGE_TAG}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_volume:
