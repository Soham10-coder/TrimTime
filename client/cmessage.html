<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - LegalConnect</title>
    <link rel="stylesheet" href="cmessage.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .sidebar {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            color: rgb(31, 211, 251);
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .top-bar {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .messages-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f1f1f1;
            border-left: 4px solid #3498db;
            border-radius: 5px;
        }

        .message .sender {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .send-message {
            margin-top: 20px;
        }

        .send-message input[type="text"] {
            padding: 10px;
            width: 70%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .send-message button {
            padding: 10px 15px;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .send-message button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>LegalConnect</h2>
        <a href="cdash.html">Home</a>
        <a href="clawyers.html">Lawyer</a>
        <a href="cappointments.html">Appointments</a>
        <a href="cmessage.html">Messages</a>
        <a href="cbill.html">Billing & Payments</a>
        <a href="cprofile.html">Profile</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2>Messages</h2>
        </div>
        <div class="messages-container">
            <div class="message">
                <div class="sender">Lawyer: Soham Bagade</div>
                <div class="content">Your next hearing is scheduled for next week.</div>
            </div>
            <div class="message">
                <div class="sender">You</div>
                <div class="content">Thank you for the update.</div>
            </div>
            <div class="send-message">
                <input type="text" placeholder="Type your message...">
                <button>Send</button>
            </div>
        </div>
    </div>
</body>
</html>
