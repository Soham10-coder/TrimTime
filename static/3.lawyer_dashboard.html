<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawyer Dashboard - Advier</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }
    .stats-card {
        background: linear-gradient(135deg, #ffffff 0%, #fcfcfc 100%);
        padding: 2rem;
        border-radius: var(--radius-lg);
        box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.05);
        display: flex;
        align-items: center;
        gap: 1.5rem;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        position: relative;
        overflow: hidden;
    }
    .stats-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 4px; height: 100%;
        background: var(--primary);
        border-radius: 4px 0 0 4px;
    }
    .stats-card:nth-child(2)::before { background: var(--secondary); }
    .stats-card:nth-child(3)::before { background: var(--danger); }
    
    .stats-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    .stats-icon {
        width: 65px;
        height: 65px;
        border-radius: 16px;
        background: rgba(15, 15, 15, 0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        color: var(--primary);
        box-shadow: inset 0 2px 5px rgba(255,255,255,0.8);
    }
    .stats-card:nth-child(2) .stats-icon {
        background: rgba(59, 130, 246, 0.1);
        color: var(--secondary);
    }
    .stats-card:nth-child(3) .stats-icon {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
    }
    .appointments-card {
        background: #ffffff;
        padding: 2.5rem;
        border-radius: var(--radius-lg);
        box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        border: 1px solid rgba(0,0,0,0.06);
    }
    .appointments-card h2 {
        font-size: 1.5rem;
        letter-spacing: -0.5px;
    }
    .appointments-card ul {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .appointments-card li {
      background: #fafafa;
      padding: 1.5rem 2rem;
      border-radius: var(--radius-md);
      border-left: 5px solid var(--primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      border-top: 1px solid transparent;
      border-right: 1px solid transparent;
      border-bottom: 1px solid transparent;
    }
    .appointments-card li:hover {
        background: #ffffff;
        box-shadow: 0 12px 24px rgba(0,0,0,0.06);
        transform: translateX(6px);
        border-color: rgba(0,0,0,0.05);
        border-left-color: var(--primary); /* keep left border strong */
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <h1 id="welcome-text">Adv.</h1>
      </div>

      <!-- Stats -->
      <section class="stats-grid">
        <div class="stats-card">
          <div class="stats-icon"><i class="fas fa-briefcase"></i></div>
          <div>
              <h3 style="color: var(--text-muted); font-size: 0.9rem; margin:0;">Total Cases</h3>
              <p style="font-size: 2rem; font-weight: 700; color: var(--primary);">12</p>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-icon"><i class="fas fa-gavel"></i></div>
          <div>
              <h3 style="color: var(--text-muted); font-size: 0.9rem; margin:0;">Active Cases</h3>
              <p style="font-size: 2rem; font-weight: 700; color: var(--secondary);">4</p>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-icon"><i class="fas fa-calendar-alt"></i></div>
          <div>
              <h3 style="color: var(--text-muted); font-size: 0.9rem; margin:0;">Pending Appointments</h3>
              <p style="font-size: 2rem; font-weight: 700; color: var(--danger);"><span id="pending-appointments-count">0</span></p>
          </div>
        </div>
      </section>

      <!-- Content -->
      <section class="appointments-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Upcoming Appointments</h2>
            <a href="8.lawyer_appointment.html" class="btn btn-outline" style="font-size: 0.85rem; padding: 0.5rem 1rem;">View All</a>
        </div>
        <ul id="appointments-list">
          <li style="border-color: #ccc;">Loading your schedule...</li>
        </ul>
      </section>

    </main>
  </div>

  <!-- Inject unified sidebar -->
  <script src="sidebar.js"></script>

  <script>
    const name = localStorage.getItem('userName');
    if (name) {
      document.getElementById('welcome-text').textContent = `Adv. ${name}`;
    }

    const lawyerEmail = localStorage.getItem('userEmail');

    async function loadAppointments() {
      if (!lawyerEmail) return;
      
      try {
        const res = await fetch(`/api/lawyer/appointments?lawyerEmail=${encodeURIComponent(lawyerEmail)}`);
        const appointments = await res.json();

        const today = new Date();
        const upcomingAppointments = appointments.filter(app => {
          const dateObj = new Date(app.date);
          return dateObj >= today;
        }).slice(0, 5); // Limit to next 5

        const list = document.getElementById('appointments-list');
        list.innerHTML = '';
        if (upcomingAppointments.length === 0) {
          list.innerHTML = '<li style="border-color:#ccc; color: var(--text-muted);">No upcoming appointments scheduled.</li>';
        } else {
          upcomingAppointments.forEach(app => {
            const li = document.createElement('li');
            let statusColor = app.status === 'Accepted' || app.status === 'accepted' ? 'var(--success)' : 
                              (app.status === 'Rejected' || app.status === 'rejected' ? 'var(--danger)' : 'var(--secondary)');
            li.style.borderLeftColor = statusColor;
            
            li.innerHTML = `
                <div>
                    <strong style="font-size:1.1rem;">${app.clientName || app.clientEmail || 'Client'}</strong>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem;">${app.topic || 'General Consultation'}</div>
                </div>
                <div style="text-align: right;">
                    <strong style="color: var(--primary);">${app.date} ${app.time ? 'at ' + app.time : ''}</strong>
                    <div style="color: ${statusColor}; font-weight:600; font-size: 0.85rem; margin-top: 0.3rem;">${app.status ? app.status.toUpperCase() : 'REQUESTED'}</div>
                </div>
            `;
            list.appendChild(li);
          });
        }

        const pendingCount = appointments.filter(app => {
          const dateObj = new Date(app.date);
          return dateObj >= today && (app.status === 'pending' || app.status === 'Requested' || !app.status);
        }).length;
        document.getElementById('pending-appointments-count').textContent = pendingCount;
      } catch (err) {
        document.getElementById('appointments-list').innerHTML = '<li style="border-color:var(--danger);">Error loading appointments.</li>';
      }
    }

    loadAppointments();
  </script>
</body>
</html>
