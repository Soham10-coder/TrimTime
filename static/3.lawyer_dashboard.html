<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawyer Dashboard - LegalConnect</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .stats-card {
        background: var(--bg-surface);
        padding: 1.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 1.5rem;
        transition: var(--transition);
    }
    .stats-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-md);
        border-color: var(--secondary);
    }
    .stats-icon {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--bg-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: var(--secondary); /* Gold */
    }
    .appointments-card {
        background: var(--bg-surface);
        padding: 2rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
    }
    .appointments-card ul {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .appointments-card li {
      background: var(--bg-light);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border-left: 4px solid var(--primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>
        <h1 id="welcome-text">Welcome, Advocate</h1>
      </div>

      <!-- Stats -->
      <section class="stats-grid">
        <div class="stats-card">
          <div class="stats-icon"><i class="fas fa-briefcase"></i></div>
          <div>
              <h3 style="color: var(--text-muted); font-size: 0.9rem; margin:0;">Total Cases</h3>
              <p style="font-size: 2rem; font-weight: 700; color: var(--primary);">12</p>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-icon"><i class="fas fa-gavel"></i></div>
          <div>
              <h3 style="color: var(--text-muted); font-size: 0.9rem; margin:0;">Active Cases</h3>
              <p style="font-size: 2rem; font-weight: 700; color: var(--secondary);">4</p>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-icon"><i class="fas fa-calendar-alt"></i></div>
          <div>
              <h3 style="color: var(--text-muted); font-size: 0.9rem; margin:0;">Pending Appointments</h3>
              <p style="font-size: 2rem; font-weight: 700; color: var(--danger);"><span id="pending-appointments-count">0</span></p>
          </div>
        </div>
      </section>

      <!-- Content -->
      <section class="appointments-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Upcoming Appointments</h2>
            <a href="8.lawyer_appointment.html" class="btn btn-outline" style="font-size: 0.85rem; padding: 0.5rem 1rem;">View All</a>
        </div>
        <ul id="appointments-list">
          <li style="border-color: #ccc;">Loading your schedule...</li>
        </ul>
      </section>

    </main>
  </div>

  <!-- Inject unified sidebar -->
  <script src="sidebar.js"></script>

  <script>
    const name = localStorage.getItem('userName');
    if (name) {
      document.getElementById('welcome-text').textContent = `Welcome, Advocate ${name}`;
    }

    const lawyerEmail = localStorage.getItem('userEmail');

    async function loadAppointments() {
      if (!lawyerEmail) return;
      
      try {
        const res = await fetch(`/api/lawyer/appointments?lawyerEmail=${encodeURIComponent(lawyerEmail)}`);
        const appointments = await res.json();

        const today = new Date();
        const upcomingAppointments = appointments.filter(app => {
          const dateObj = new Date(app.date);
          return dateObj >= today;
        }).slice(0, 5); // Limit to next 5

        const list = document.getElementById('appointments-list');
        list.innerHTML = '';
        if (upcomingAppointments.length === 0) {
          list.innerHTML = '<li style="border-color:#ccc; color: var(--text-muted);">No upcoming appointments scheduled.</li>';
        } else {
          upcomingAppointments.forEach(app => {
            const li = document.createElement('li');
            let statusColor = app.status === 'Accepted' || app.status === 'accepted' ? 'var(--success)' : 
                              (app.status === 'Rejected' || app.status === 'rejected' ? 'var(--danger)' : 'var(--secondary)');
            li.style.borderLeftColor = statusColor;
            
            li.innerHTML = `
                <div>
                    <strong style="font-size:1.1rem;">${app.clientName || app.clientEmail || 'Client'}</strong>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem;">${app.topic || 'General Consultation'}</div>
                </div>
                <div style="text-align: right;">
                    <strong style="color: var(--primary);">${app.date} ${app.time ? 'at ' + app.time : ''}</strong>
                    <div style="color: ${statusColor}; font-weight:600; font-size: 0.85rem; margin-top: 0.3rem;">${app.status ? app.status.toUpperCase() : 'REQUESTED'}</div>
                </div>
            `;
            list.appendChild(li);
          });
        }

        const pendingCount = appointments.filter(app => {
          const dateObj = new Date(app.date);
          return dateObj >= today && (app.status === 'pending' || app.status === 'Requested' || !app.status);
        }).length;
        document.getElementById('pending-appointments-count').textContent = pendingCount;
      } catch (err) {
        document.getElementById('appointments-list').innerHTML = '<li style="border-color:var(--danger);">Error loading appointments.</li>';
      }
    }

    loadAppointments();
  </script>
</body>
</html>
