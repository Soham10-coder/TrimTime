<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advocate Profile - Advier ⚖️</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .profile-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 3rem;
      border: 1px solid var(--border-color);
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    .profile-card img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1.5rem auto;
      border: 4px solid var(--bg-light);
      box-shadow: var(--shadow-md);
      display: none;
    }
    .profile-card h3 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .profile-card .tagline {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-weight: 500;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      text-align: left;
      margin-bottom: 2rem;
      background: var(--bg-light);
      padding: 2rem;
      border-radius: var(--radius-md);
    }
    @media (min-width: 600px) {
        .detail-grid {
            grid-template-columns: 1fr 1fr;
        }
    }
    .detail-item strong {
      display: block;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }
    .detail-item p, .detail-item div {
      font-size: 1.05rem;
      color: var(--text-main);
    }
    .doc-link {
        display: inline-block;
        background: white;
        padding: 0.4rem 0.8rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
    }
    .contact-btn {
        font-size: 1.1rem;
        padding: 1rem 3rem;
        margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    
    <!-- Sidebar injected via sidebar.js -->

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1>Advocate Details <button class="btn btn-outline" style="float:right; padding: 0.4rem 1rem;" onclick="history.back()">← Back</button></h1>
      </div>

      <div class="profile-card">
        <img id="profile-pic-img" src="" alt="Advocate Picture">
        <h3 id="lawyer-name">Loading...</h3>
        <p class="tagline" id="lawyer-specialty">Fetching data...</p>
        <div id="lawyer-rating-display" style="color:#fbbf24; font-size:1.3rem; margin-bottom:1.5rem;"></div>

        <div class="detail-grid">
            <div class="detail-item">
                <strong>Years of Experience</strong>
                <p id="lawyer-experience">0 years</p>
            </div>
            <div class="detail-item" style="grid-column: 1 / -1;">
                <strong>Professional Bio & Achievements</strong>
                <p id="lawyer-achievements">N/A</p>
            </div>
            <div class="detail-item">
                <strong>Certifications</strong>
                <div id="certificates-list">None uploaded.</div>
            </div>
            <div class="detail-item">
                <strong>Degree Certificates</strong>
                <div id="grad-certificates-list">None uploaded.</div>
            </div>
        </div>

        <button class="btn btn-primary contact-btn" onclick="redirectToAppointment()">Book Appointment</button>
        <button class="btn btn-outline contact-btn" onclick="openRatingModal()" style="margin-left:1rem;">Rate Advocate</button>
      </div>

    </main>
  </div>
  
  <div id="toast-container" class="toast-container"></div>

  <!-- Rating Modal -->
  <div id="ratingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
      <div style="background:var(--bg-surface); padding:2rem; border-radius:var(--radius-lg); width:90%; max-width:400px; text-align:center;">
          <h3 style="margin-bottom:1rem;">Rate this Advocate</h3>
          <div id="star-rating" style="font-size:2rem; color:#ccc; margin-bottom:1rem; cursor:pointer; display:flex; justify-content:center; gap:5px;">
              <i class="fas fa-star rating-star" data-val="1"></i>
              <i class="fas fa-star rating-star" data-val="2"></i>
              <i class="fas fa-star rating-star" data-val="3"></i>
              <i class="fas fa-star rating-star" data-val="4"></i>
              <i class="fas fa-star rating-star" data-val="5"></i>
          </div>
          <textarea id="review-text" rows="3" placeholder="Leave an optional review..." style="width:100%; margin-bottom:1rem; padding:0.5rem; border-radius:var(--radius-sm); border:1px solid var(--border-color);"></textarea>
          <button class="btn btn-primary" onclick="submitRating()" style="width:100%;">Submit Rating</button>
          <button class="btn btn-outline" onclick="closeRatingModal()" style="width:100%; margin-top:0.5rem;">Cancel</button>
      </div>
  </div>

  <script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    const params = new URLSearchParams(window.location.search);
    const lawyerEmail = params.get('email');

    async function loadLawyerProfile(email) {
      if (!email) {
        showToast("No lawyer email found.", "error");
        return;
      }

      try {
        const res = await fetch(`/getProfile/${email}`);
        const data = await res.json();

        if (!res.ok) {
          showToast(data.message || "Failed to fetch profile.", "error");
          document.getElementById('lawyer-name').textContent = "Not Found";
          return;
        }

        document.getElementById('lawyer-name').textContent = `${data.firstName || ''} ${data.lastName || ''}`.trim() || 'Unregistered Advocate';
        document.getElementById('lawyer-specialty').textContent = `${data.specialization || 'General Practice'} Specialist`;
        document.getElementById('lawyer-experience').textContent = `${data.experience || 'N/A'} years`;
        document.getElementById('lawyer-achievements').textContent = data.achievements || 'N/A';

        // Render average rating
        const avgRating = data.averageRating || 0;
        let starsHTML = '';
        for(let i=1; i<=5; i++) {
            if (i <= Math.round(avgRating)) {
                starsHTML += '<i class="fas fa-star"></i>';
            } else {
                starsHTML += '<i class="far fa-star"></i>';
            }
        }
        starsHTML += ` <span style="color: var(--text-muted); font-size: 1rem;">(${avgRating})</span>`;
        document.getElementById('lawyer-rating-display').innerHTML = starsHTML;

        const profilePicImg = document.getElementById('profile-pic-img');
        if (data.profilePicUrl) {
          profilePicImg.src = data.profilePicUrl;
          profilePicImg.style.display = 'block';
        } else {
          profilePicImg.src = 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
          profilePicImg.style.display = 'block';
        }

        const certList = document.getElementById('certificates-list');
        certList.innerHTML = '';
        if (Array.isArray(data.certificationsUrls) && data.certificationsUrls.length > 0) {
          data.certificationsUrls.forEach(url => {
            if (!url) return;
            const fileName = url.split('/').pop() || 'Document';
            const link = document.createElement('a');
            link.href = url;
            link.className = 'doc-link';
            link.textContent = '📄 ' + fileName;
            link.target = '_blank';
            certList.appendChild(link);
          });
        } else {
          certList.textContent = 'None uploaded.';
        }

        const gradList = document.getElementById('grad-certificates-list');
        gradList.innerHTML = '';
        if (Array.isArray(data.graduationCertificatesUrls) && data.graduationCertificatesUrls.length > 0) {
          data.graduationCertificatesUrls.forEach(url => {
            if (!url) return;
            const fileName = url.split('/').pop() || 'Document';
            const link = document.createElement('a');
            link.href = url;
            link.className = 'doc-link';
            link.textContent = '🎓 ' + fileName;
            link.target = '_blank';
            gradList.appendChild(link);
          });
        } else {
          gradList.textContent = 'None uploaded.';
        }

      } catch (err) {
        showToast("Could not connect to server.", "error");
      }
    }

    if (lawyerEmail) {
      loadLawyerProfile(lawyerEmail);
    }

    function redirectToAppointment() {
      if(!lawyerEmail) return;
      window.location.href = `cappointment.html?lawyerEmail=${encodeURIComponent(lawyerEmail)}`;
    }

    // Rating Logic
    let currentRating = 0;
    const clientEmail = localStorage.getItem('userEmail');
    const role = localStorage.getItem('role');

    function openRatingModal() {
        if (!clientEmail || role !== 'client') {
            showToast("Only logged-in clients can rate.", "error");
            return;
        }
        document.getElementById('ratingModal').style.display = 'flex';
    }

    function closeRatingModal() {
        document.getElementById('ratingModal').style.display = 'none';
        currentRating = 0;
        document.getElementById('review-text').value = '';
        updateStarsUI(0);
    }

    document.querySelectorAll('.rating-star').forEach(star => {
        star.addEventListener('click', function() {
            currentRating = parseInt(this.getAttribute('data-val'));
            updateStarsUI(currentRating);
        });
    });

    function updateStarsUI(rating) {
        document.querySelectorAll('.rating-star').forEach(star => {
            if (parseInt(star.getAttribute('data-val')) <= rating) {
                star.style.color = '#fbbf24';
            } else {
                star.style.color = '#ccc';
            }
        });
    }

    async function submitRating() {
        if (currentRating === 0) {
            showToast("Please select a star rating.", "error");
            return;
        }
        
        const reviewText = document.getElementById('review-text').value;
        const btn = document.querySelector('#ratingModal .btn-primary');
        btn.textContent = 'Submitting...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/lawyer/rate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lawyerEmail: lawyerEmail,
                    clientEmail: clientEmail,
                    rating: currentRating,
                    review: reviewText
                })
            });

            const data = await res.json();
            if (res.ok) {
                showToast("Rating submitted successfully!");
                closeRatingModal();
                loadLawyerProfile(lawyerEmail); // reload to show new rating
            } else {
                showToast(data.message || "Failed to submit rating.", "error");
            }
        } catch (err) {
            showToast("Server error.", "error");
        } finally {
            btn.textContent = 'Submit Rating';
            btn.disabled = false;
        }
    }
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
