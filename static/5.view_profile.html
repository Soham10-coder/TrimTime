<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile - Advier</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .profile-header {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }
    .profile-header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: var(--shadow-md);
      border: 3px solid white;
    }
    .profile-header h2 {
      margin-bottom: 0.2rem;
    }
    .profile-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .profile-section {
      background: var(--bg-surface);
      padding: 2rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 2rem;
    }
    .profile-section h3 {
      font-size: 1.2rem;
      border-bottom: 2px solid var(--bg-light);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      color: var(--primary);
    }
    .data-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }
    @media (min-width: 768px) {
      .data-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .data-item strong {
      display: block;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.2rem;
    }
    .data-item p, .data-item div {
      font-size: 1.05rem;
    }
    .doc-link {
      display: inline-block;
      background: var(--bg-light);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    
    <!-- Sidebar injected via sidebar.js -->

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1>Your Live Profile 
            <a href="4.lawyer_profile.html" class="btn btn-outline" style="float:right; padding: 0.5rem 1rem;">Edit</a>
        </h1>
      </div>

      <div class="profile-header">
        <img id="profilePic" src="" alt="Profile Avatar" style="display:none;" />
        <div>
          <h2 id="prof-name">Loading Profile...</h2>
          <p id="prof-title">Advocate / Legal Professional</p>
        </div>
      </div>

      <div class="profile-section">
        <h3>Professional Overview</h3>
        <div class="data-grid">
          <div class="data-item">
            <strong>Area of Specialization</strong>
            <p id="specialization">N/A</p>
          </div>
          <div class="data-item">
            <strong>Years of Experience</strong>
            <p id="experience">N/A</p>
          </div>
          <div class="data-item" style="grid-column: 1 / -1;">
            <strong>Achievements & Bio</strong>
            <p id="achievements">N/A</p>
          </div>
        </div>
      </div>

      <div class="profile-section">
        <h3>Verified Credentials</h3>
        <div class="data-grid">
          <div class="data-item">
            <strong>Bar Council / Certifications</strong>
            <div id="certifications">None uploaded.</div>
          </div>
          <div class="data-item">
            <strong>Educational Degrees</strong>
            <div id="graduationCertificates">None uploaded.</div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.clear(); }
    
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    async function loadProfile() {
      const email = localStorage.getItem('userEmail');
      const name = localStorage.getItem('userName');
      if (!email) {
        showToast("User session expired. Redirecting...", "error");
        setTimeout(()=> window.location.href = "1.user_login.html", 1500);
        return;
      }

      if(name) {
          document.getElementById('prof-name').textContent = "Advocate " + name;
      }

      try {
        const res = await fetch(`/getProfile/${email}`);
        const data = await res.json();

        if (!res.ok) {
          showToast(data.message || "Please complete your profile.", "error");
          return;
        }

        document.getElementById('achievements').textContent = data.achievements || 'N/A';
        document.getElementById('experience').textContent = (data.experience || '0') + ' Years';
        document.getElementById('specialization').textContent = data.specialization || 'N/A';

        const certsContainer = document.getElementById('certifications');
        certsContainer.innerHTML = '';
        if(data.certificationsUrls && data.certificationsUrls.length > 0) {
            data.certificationsUrls.forEach(url => {
            if(!url) return;
            const link = document.createElement('a');
            link.href = url;
            link.className = 'doc-link';
            link.textContent = '📄 ' + (url.split('/').pop() || 'Document');
            link.target = '_blank';
            certsContainer.appendChild(link);
            });
        } else {
            certsContainer.textContent = 'None uploaded.';
        }

        const gradsContainer = document.getElementById('graduationCertificates');
        gradsContainer.innerHTML = '';
        if(data.graduationCertificatesUrls && data.graduationCertificatesUrls.length > 0) {
            data.graduationCertificatesUrls.forEach(url => {
            if(!url) return;
            const link = document.createElement('a');
            link.href = url;
            link.className = 'doc-link';
            link.textContent = '🎓 ' + (url.split('/').pop() || 'Document');
            link.target = '_blank';
            gradsContainer.appendChild(link);
            });
        } else {
            gradsContainer.textContent = 'None uploaded.';
        }

        const profilePic = document.getElementById('profilePic');
        if(data.profilePicUrl) {
            profilePic.src = data.profilePicUrl;
            profilePic.style.display = 'block';
        }

      } catch (error) {
        showToast("Server error while loading profile.", "error");
      }
    }

    loadProfile();
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
