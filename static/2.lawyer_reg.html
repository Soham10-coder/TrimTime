<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Advier ⚖️</title>
    <link rel="stylesheet" href="global.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8fafc;
            padding: 2rem;
        }
        .reg-container {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            max-width: 650px;
            width: 100%;
            border: 1px solid var(--border-color);
        }
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-header h1 {
            color: var(--secondary); /* Gold */
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }
        .brand-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .name-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        @media (min-width: 600px) {
            .name-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .checkbox-container input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: var(--secondary);
        }
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .verification-box {
            background: var(--bg-light);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px dashed var(--secondary);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="reg-container">
        <div class="brand-header">
            <h1>Advier</h1>
            <p>Create your account</p>
        </div>
        
        <form id="registrationForm">
            
            <div class="form-group">
                <label for="userType">Registering as</label>
                <select id="userType" name="userType" required>
                    <option value="">Select Role...</option>
                    <option value="lawyer">Advocate / Lawyer</option>
                    <option value="client">Client</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <div class="name-grid">
                    <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
                    <input type="text" id="MiddleName" name="MiddleName" placeholder="Middle Name">
                    <input type="text" id="LastName" name="LastName" placeholder="Last Name" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="10-digit number" required pattern="\d{10}" title="Must be exactly 10 digits">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 symbol" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <!-- Lawyer Specific -->
            <div id="lawyerFields" style="display: none;" class="verification-box">
                <h4 style="margin-bottom: 1rem; color: var(--primary);">Lawyer Verification</h4>
                <div class="form-group">
                    <label for="barCouncilNumber">Bar Council Number</label>
                    <input type="text" id="barCouncilNumber" name="barCouncilNumber" placeholder="e.g. MAH/123/2010">
                    <small style="color: var(--text-muted); display: block; margin-top: 0.3rem;">Format: STATE/NUMBER/YEAR (e.g. DEL/4567/2021)</small>
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="legalPractitioner" name="legalPractitioner">
                    <label for="legalPractitioner" style="margin-bottom:0;">I am a licensed legal practitioner</label>
                </div>
            </div>

            <input type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;" value="Create Account">
            
            <div class="auth-links">
                <p>Already have an account? <a href="1.user_login.html">Log In</a></p>
            </div>
        </form>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        const userTypeSelect = document.getElementById("userType");
        const lawyerFields = document.getElementById("lawyerFields");

        userTypeSelect.addEventListener("change", function () {
            if (this.value === "lawyer") {
                lawyerFields.style.display = "block";
                document.getElementById('barCouncilNumber').required = true;
            } else {
                lawyerFields.style.display = "none";
                document.getElementById('barCouncilNumber').required = false;
            }
        });

        document.getElementById("registrationForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            const submitBtn = document.querySelector('input[type="submit"]');
            
            const formData = new FormData(this);
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            const userType = formData.get('userType');
            const barCouncilNumber = formData.get('barCouncilNumber');

            // Password Validation
            const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordPattern.test(password)) {
                showToast("Password must include uppercase, lowercase, number, and symbol.", "error");
                return;
            }

            if (password !== confirmPassword) {
                showToast("Passwords do not match!", "error");
                return;
            }

            // Client side validation for Bar Council Number if lawyer
            if (userType === 'lawyer') {
                const barRegex = /^[A-Z]{2,4}\/\d{1,6}\/\d{4}$/;
                if (!barRegex.test(barCouncilNumber)) {
                    showToast("Invalid Bar Council Number format. Use STATE/NUMBER/YEAR.", "error");
                    return;
                }
            }

            submitBtn.value = "Registering...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.status === 201) {
                    showToast("Registration successful! Redirecting to login...", "success");
                    setTimeout(() => window.location.href = "1.user_login.html", 2000);
                } else {
                    showToast(result.message || "Registration failed.", "error");
                    submitBtn.value = "Create Account";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showToast("Server connection failed.", "error");
                submitBtn.value = "Create Account";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
