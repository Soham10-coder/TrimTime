<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Dashboard - LegalConnect</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .appointments-card ul {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .appointments-card li {
      background: var(--bg-light);
      padding: 1rem;
      border-radius: var(--radius-sm);
      border-left: 4px solid var(--primary);
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">⚖️ LegalConnect</div>
      <nav class="sidebar-nav">
        <a href="cdash.html" class="active">Dashboard</a>
        <a href="clawyers.html">Find a Lawyer</a>
        <a href="cappointments.html">My Appointments</a>
        <a href="cprofile.html">My Profile</a>
        <a href="1.user_login.html" onclick="localStorage.clear();" style="margin-top: 2rem; color: #fca5a5;">Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1 id="welcome-text">Welcome to your Dashboard</h1>
      </div>

      <div class="stats-grid" id="stats-container">
        <div class="card">
          <h3 style="color: var(--text-muted); font-size: 0.9rem;">Upcoming Appointments</h3>
          <p style="font-size: 2rem; font-weight: 700;">Loading...</p>
        </div>
      </div>

      <section class="card appointments-card" id="appointments-section">
        <h2>Your Schedule</h2>
        <ul id="appointments-list">
          <li style="border-color:#ccc;">Loading...</li>
        </ul>
      </section>
    </main>
  </div>

  <script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    const name = localStorage.getItem('userName');
    if (name) {
      document.getElementById('welcome-text').textContent = `Welcome back, ${name}!`;
    }

    const clientEmail = localStorage.getItem('userEmail');

    async function loadClientAppointments() {
      if (!clientEmail) {
        document.getElementById('appointments-list').innerHTML = '<li style="border-color:#ef4444;">Please log in again.</li>';
        return;
      }

      try {
        const res = await fetch(`http://127.0.0.1:5000/api/client/appointments?clientEmail=${encodeURIComponent(clientEmail)}`);
        const appointments = await res.json();
        const today = new Date();
        
        const upcoming = appointments.filter(app => {
            const status = (app.status || '').toLowerCase();
            return (status === 'accepted' || status === 'pending' || status === '') && new Date(app.date) >= today;
        });

        // Update stats
        const statsRow = document.getElementById('stats-container');
        statsRow.innerHTML = `
        <div class="card">
          <h3 style="color: var(--text-muted); font-size: 0.9rem;">Upcoming Appointments</h3>
          <p style="font-size: 2rem; font-weight: 700; color: var(--primary);">${upcoming.length}</p>
        </div>
        `;

        // Update list
        const list = document.getElementById('appointments-list');
        list.innerHTML = '';
        if (upcoming.length === 0) {
            list.innerHTML = '<li style="border-color:#ccc;">No upcoming appointments booked.</li>';
        } else {
            upcoming.forEach(app => {
                const li = document.createElement('li');
                let statusColor = (app.status || '').toLowerCase() === 'accepted' ? 'var(--secondary)' : 'var(--primary)';
                li.style.borderLeftColor = statusColor;
                
                li.innerHTML = `<strong>${app.date} ${app.time ? 'at ' + app.time : ''}</strong><br>
                                Lawyer Email: ${app.lawyer_email || app.lawyerEmail || 'N/A'}<br>
                                Topic: ${app.topic || 'N/A'}<br>
                                Status: <span style="color: ${statusColor}; font-weight:600;">${app.status || 'Pending'}</span>`;
                list.appendChild(li);
            });
        }
      } catch (err) {
        document.getElementById('appointments-list').innerHTML = '<li style="border-color:#ef4444;">Error loading appointments.</li>';
      }
    }

    loadClientAppointments();
  </script>
</body>
</html>
