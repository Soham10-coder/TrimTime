<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advocate Connect - LegalConnect</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <style>
        .messenger-wrapper {
            display: flex;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            height: calc(100vh - 120px);
            overflow: hidden;
        }

        .contacts-panel {
            width: 300px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: var(--bg-light);
        }

        .contacts-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .contact-card {
            padding: 1rem;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .contact-card:hover, .contact-card.active {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .contact-card.active {
            background: #eff6ff;
        }

        .contact-card h4 {
            margin: 0 0 0.3rem 0;
            font-size: 1rem;
            color: var(--text-main);
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .chat-header h3 {
            margin: 0;
            color: var(--primary);
        }

        .messages-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--bg-surface);
        }

        .message-bubble {
            max-width: 70%;
            padding: 1rem;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            box-shadow: var(--shadow-sm);
            word-wrap: break-word;
        }

        .msg-received {
            background: #f1f5f9;
            align-self: flex-start;
            border-bottom-left-radius: 0;
            color: var(--text-main);
        }

        .msg-sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .msg-time {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 5px;
            display: block;
            text-align: right;
            font-weight: 500;
        }

        .file-attachment {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
            text-decoration: none;
            color: inherit;
        }
        .file-attachment:hover {
            background: rgba(0,0,0,0.15);
        }
        .img-attachment {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 8px;
            display: block;
            max-height: 250px;
            object-fit: cover;
        }

        .input-panel {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
        }

        .file-btn {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            cursor: pointer;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .file-btn:hover { color: var(--primary); border-color: var(--primary); }

        .input-panel input[type="text"] {
            flex: 1;
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .input-panel button.btn-primary {
            padding: 0 2rem;
            border-radius: var(--radius-md);
        }

        .empty-state {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">⚖️ LegalConnect</div>
            <nav class="sidebar-nav">
                <a href="cdash.html">Dashboard</a>
                <a href="clawyers.html">Find a Lawyer</a>
                <a href="cappointments.html">My Appointments</a>
                <a href="cmessage.html" class="active">Secure Chat</a>
                <a href="cprofile.html">My Profile</a>
                <a href="1.user_login.html" onclick="localStorage.clear();" style="margin-top: 2rem; color: #fca5a5;">Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" onclick="toggleMenu()">☰</button>
                <h1>Consultation Messages</h1>
            </div>

            <div class="messenger-wrapper">
                
                <!-- Active Lawyers List -->
                <div class="contacts-panel">
                    <div class="contacts-header">
                        <h3 style="margin:0; font-size: 1.1rem;">My Advocates</h3>
                    </div>
                    <div class="contact-list" id="contactList">
                        <p style="color:var(--text-muted); text-align:center;">Loading legal team...</p>
                    </div>
                </div>

                <!-- Live Chat View -->
                <div class="chat-panel" id="chatPanel" style="display: none;">
                    <div class="chat-header">
                        <h3 id="currentChatName">Select an Advocate</h3>
                    </div>
                    
                    <div class="messages-container" id="messagesContainer">
                        <!-- Messages dynamically inserted here -->
                    </div>

                    <div class="input-panel">
                        <input type="file" id="fileAttach" style="display: none;" onchange="handleFileUpload()">
                        <button class="file-btn" onclick="document.getElementById('fileAttach').click()" title="Send File or Image">📎</button>
                        <input type="text" id="msgInput" placeholder="Type a secure message..." onkeypress="handleEnter(event)">
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="chat-panel empty-state" id="emptyState">
                    <h2 style="color:var(--border-color); font-size:4rem; margin:0;">💬</h2>
                    <h3 style="margin-top:1rem;">Select an advocate to start messaging.</h3>
                    <p>Only advocates from accepted appointments will appear here.</p>
                </div>

            </div>
        </main>
    </div>

    <!-- Toast UI -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        
        const socket = io();
        const clientEmail = localStorage.getItem('userEmail');
        let currentRoom = null;
        let targetLawyerEmail = null;

        if(!clientEmail) { alert('Session Expired'); window.location.href = '1.user_login.html'; }

        // Fetch accepted lawyers
        fetch(`/api/client/appointments?clientEmail=${encodeURIComponent(clientEmail)}`)
        .then(res => res.json())
        .then(appointments => {
            const contactList = document.getElementById('contactList');
            contactList.innerHTML = '';
            const uniqueLawyers = new Map();
            appointments.forEach(app => {
                if((app.status || '').toLowerCase() === 'accepted') {
                    const lEmail = app.lawyer_email || app.lawyerEmail;
                    if(lEmail && !uniqueLawyers.has(lEmail)) {
                        uniqueLawyers.set(lEmail, app.lawyerName || app.lawyer_name || lEmail);
                    }
                }
            });

            if(uniqueLawyers.size === 0) {
                contactList.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding: 1rem;">No accepted cases yet. Book an appointment first.</p>';
            } else {
                uniqueLawyers.forEach((lawyerName, lEmail) => {
                    const card = document.createElement('div');
                    card.className = 'contact-card';
                    card.innerHTML = `<h4>Advocate ${lawyerName}</h4><span style="font-size:0.8rem; color:var(--text-muted);">${lEmail}</span>`;
                    card.onclick = () => openChat(lEmail, lawyerName, card);
                    contactList.appendChild(card);
                });

                const urlParams = new URLSearchParams(window.location.search);
                const focusEmail = urlParams.get('lawyer_email');
                if(focusEmail) {
                    const matchedCard = Array.from(document.querySelectorAll('.contact-card')).find(c => c.innerHTML.includes(focusEmail));
                    if(matchedCard) matchedCard.click();
                }
            }
        });

        function openChat(email, name, cardElement) {
            document.querySelectorAll('.contact-card').forEach(c => c.classList.remove('active'));
            cardElement.classList.add('active');
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatPanel').style.display = 'flex';
            document.getElementById('currentChatName').innerText = `Advocate ${name}`;
            
            targetLawyerEmail = email;
            currentRoom = [clientEmail, targetLawyerEmail].sort().join('_');
            socket.emit('join_room', { room: currentRoom });

            fetch(`/api/messages/${currentRoom}`)
            .then(res => res.json())
            .then(messages => {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                messages.forEach(msg => renderMessage(msg));
                scrollToBottom();
            });
        }

        function formatIST(timestampStr) {
            if(!timestampStr) return '';
            const dateObj = new Date(timestampStr + 'Z'); 
            
            const today = new Date();
            const yest = new Date();
            yest.setDate(yest.getDate() - 1);

            const isToday = dateObj.toDateString() === today.toDateString();
            const isYest = dateObj.toDateString() === yest.toDateString();

            const timeStr = dateObj.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute:'2-digit' });

            if(isToday) return `Today, ${timeStr}`;
            if(isYest) return `Yesterday, ${timeStr}`;
            return `${dateObj.toLocaleDateString('en-IN', {timeZone: 'Asia/Kolkata'})} ${timeStr}`;
        }

        // Send Text Message
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if(!msg || !currentRoom) return;

            socket.emit('send_message', { room: currentRoom, message: msg, sender: 'client', senderEmail: clientEmail });
            input.value = '';
        }

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

        // Upload and Send File
        async function handleFileUpload() {
            const fileInput = document.getElementById('fileAttach');
            if(!fileInput.files.length || !currentRoom) return;
            
            const file = fileInput.files[0];
            showToast(`Uploading ${file.name}...`, 'success');
            
            const formData = new FormData();
            formData.append('room', currentRoom);
            formData.append('file', file);

            try {
                const res = await fetch('/api/chat/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(data.url) {
                    socket.emit('send_message', {
                        room: currentRoom,
                        message: '',
                        sender: 'client',
                        senderEmail: clientEmail,
                        fileUrl: data.url,
                        fileName: data.filename
                    });
                }
            } catch (err) {
                showToast("File upload failed.", "error");
            }
            fileInput.value = '';
        }

        socket.on('receive_message', (data) => {
            renderMessage(data);
            scrollToBottom();
        });

        function renderMessage(msgObj) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            
            const isUs = msgObj.senderRole === 'client' || msgObj.sender === 'client';
            div.className = isUs ? 'message-bubble msg-sent' : 'message-bubble msg-received';
            
            const timeStr = formatIST(msgObj.timestamp);

            let contentHtml = msgObj.message ? `<div>${msgObj.message}</div>` : '';
            
            if(msgObj.fileUrl) {
                const ext = msgObj.fileName ? msgObj.fileName.split('.').pop().toLowerCase() : '';
                if(['jpg','jpeg','png','gif','webp'].includes(ext)) {
                    contentHtml += `<a href="${msgObj.fileUrl}" target="_blank"><img src="${msgObj.fileUrl}" class="img-attachment" alt="${msgObj.fileName}"></a>`;
                } else {
                    contentHtml += `
                    <a href="${msgObj.fileUrl}" target="_blank" class="file-attachment" download>
                        📄 <span>${msgObj.fileName || 'Attachment'}</span>
                    </a>`;
                }
            }

            div.innerHTML = `${contentHtml} <span class="msg-time">${timeStr}</span>`;
            container.appendChild(div);
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
