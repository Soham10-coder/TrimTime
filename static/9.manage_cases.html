<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Cases - LegalConnect</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .filter-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      background: var(--bg-surface);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }
    .filter-section input { flex: 1; min-width: 200px; }
    .filter-section select { width: auto; min-width: 150px; }
    
    .case-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    
    .case-card {
      background: var(--bg-surface);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border-left: 5px solid var(--primary);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }
    .case-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .case-card[data-status="accepted"] { border-left-color: var(--secondary); }
    .case-card[data-status="pending"] { border-left-color: #f59e0b; }
    .case-card[data-status="rejected"] { border-left-color: var(--danger); }
    
    .case-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
    }
    .case-card-header h3 { color: var(--text-main); margin-bottom: 0.2rem; font-size: 1.15rem; }
    .case-card-header .badge {
        font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.6rem; border-radius: var(--radius-sm); text-transform: uppercase;
    }
    .badge-accepted { background: #d1fae5; color: #059669; }
    .badge-pending { background: #fef3c7; color: #d97706; }
    .badge-rejected { background: #fee2e2; color: #dc2626; }
    
    .case-body { flex: 1; }
    .case-body .desc {
        color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5;
        background: var(--bg-light); padding: 0.8rem; border-radius: var(--radius-sm);
    }
    .case-body strong { color: var(--text-main); font-size: 0.95rem; }
    
    .document-list {
        margin-top: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    .document-list a {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: #f8fafc;
        border: 1px solid var(--border-color);
        padding: 0.5rem 0.8rem;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        color: var(--primary);
    }
    .document-list a:hover { background: var(--bg-light); border-color: var(--primary); }
    
    .btn-action { margin-top: 1.5rem; width: 100%; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">⚖️ LegalConnect</div>
      <nav class="sidebar-nav">
        <a href="3.lawyer_dashboard.html">Dashboard</a>
        <a href="9.manage_cases.html" class="active">Manage Cases</a>
        <a href="8.lawyer_appointment.html">Appointments Record</a>
        <a href="6.lawyer_clientmg.html">Clients Requests</a>
        <a href="7.lawyer_message.html">Messages</a>
        <a href="4.lawyer_profile.html">Edit Profile</a>
        <a href="5.view_profile.html">View Profile</a>
        <a href="1.user_login.html" onclick="logout()" style="margin-top: 2rem; color: #fca5a5;">Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <h1>Case Details & Files</h1>
      </div>

      <!-- Search and Filter Section -->
      <div class="filter-section">
        <input type="text" id="searchInput" placeholder="Search by client or case title..." onkeyup="filterCases()"/>
        <select id="statusFilter" onchange="filterCases()">
          <option value="all">All Cases</option>
          <option value="pending">Pending</option>
          <option value="accepted">Accepted / Ongoing</option>
          <option value="rejected">Rejected</option>
        </select>
        <button class="btn btn-outline" style="padding: 0.5rem 1rem;" onclick="loadCases()">↻ Refresh</button>
      </div>

      <!-- Case List Section -->
      <div class="case-list" id="caseList">
          <p style="color:var(--text-muted); padding: 1rem;">Loading your case directory securely...</p>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.clear(); }
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    const lawyerEmail = localStorage.getItem('userEmail');

    async function loadCases() {
        if(!lawyerEmail) return;
        const container = document.getElementById('caseList');
        
        try {
            const res = await fetch(`http://localhost:5000/api/lawyer/appointments?lawyerEmail=${encodeURIComponent(lawyerEmail)}`);
            const data = await res.json();
            
            container.innerHTML = '';
            
            if(data.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); padding: 1rem;">No cases on record yet.</div>';
                return;
            }

            data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

            data.forEach(app => {
                const statusRaw = (app.status || 'Pending').toLowerCase();
                const statusBadge = `badge-${statusRaw}`;
                const statusDisplay = statusRaw === 'accepted' ? 'Ongoing' : (statusRaw === 'pending' ? 'Pending' : 'Closed/Rejected');
                
                const clientName = app.clientName || app.clientEmail || 'Client';
                const topic = app.topic || 'General Consultation';
                const desc = app.description || 'No detailed description provided by the client.';
                
                const card = document.createElement('div');
                card.className = 'case-card';
                card.setAttribute('data-status', statusRaw);

                let filesHtml = '';
                if(app.caseFiles && app.caseFiles.length > 0) {
                    filesHtml = '<div class="document-list"><strong>Uploaded Case Documents:</strong>';
                    app.caseFiles.forEach(url => {
                        const filename = url.split('/').pop();
                        filesHtml += `<a href="${url}" target="_blank" download>📎 ${filename}</a>`;
                    });
                    filesHtml += '</div>';
                }

                card.innerHTML = `
                    <div class="case-card-header">
                        <div>
                            <span style="font-size:0.8rem; color:var(--primary); font-weight:600; text-transform:uppercase;">CLIENT: ${clientName}</span>
                            <h3>${topic}</h3>
                        </div>
                        <span class="badge ${statusBadge}">${statusDisplay}</span>
                    </div>
                    <div class="case-body">
                        <div class="desc">"${desc}"</div>
                        <p style="font-size:0.85rem; color:var(--text-muted);"><strong style="color:var(--text-main)">📅 Scheduled:</strong> ${app.date} at ${app.time}</p>
                        ${filesHtml}
                    </div>
                    ${statusRaw === 'accepted' ? `<a href="7.lawyer_message.html?client_email=${encodeURIComponent(app.clientEmail)}" class="btn btn-outline btn-action" style="text-align:center; text-decoration:none;">💬 Chat with Client</a>` : ''}
                `;
                container.appendChild(card);
            });
            filterCases(); // Apply any existing filters
        } catch(err) {
            container.innerHTML = '<div style="color:var(--danger); padding: 1rem;">Failed to connect to database.</div>';
        }
    }

    function filterCases() {
      const searchInput = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const caseCards = document.querySelectorAll('.case-card');

      caseCards.forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        const client = card.querySelector('.case-card-header span').textContent.toLowerCase();
        const status = card.dataset.status;

        const matchesSearch = title.includes(searchInput) || client.includes(searchInput);
        const matchesStatus = statusFilter === 'all' || status === statusFilter;

        card.style.display = (matchesSearch && matchesStatus) ? 'flex' : 'none';
      });
    }

    window.onload = loadCases;
  </script>
</body>
</html>
