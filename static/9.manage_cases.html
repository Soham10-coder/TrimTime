<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Cases - LegalConnect</title>
  <link rel="stylesheet" href="9.manage_cases.css" />
</head>
<body>
  <div class="container">
    <h2>Manage Cases</h2>
    
    <!-- Search and Filter Section -->
    <div class="filter-section">
      <input type="text" id="searchInput" placeholder="Search by client or case name..." />
      <select id="statusFilter">
        <option value="all">All Cases</option>
        <option value="pending">Pending</option>
        <option value="accepted">Accepted</option>
        <option value="rejected">Rejected</option>
        <option value="completed">Completed</option>
      </select>
      <button onclick="filterCases()">Apply Filter</button>
    </div>

    <!-- Case List Section -->
    <div class="case-list" id="caseList">
      <div class="case-card" data-status="accepted">
        <h3>Satyajeet Sabale</h3>
        <p>Case Type: Property Dispute</p>
        <p>Status: Accepted</p>
        <button onclick="viewCase('Satyajeet Sabale')">View Details</button>
      </div>

      <div class="case-card" data-status="pending">
        <h3>Swayam Ingale</h3>
        <p>Case Type: Divorce Settlement</p>
        <p>Status: Pending</p>
        <button onclick="viewCase('Swayam Ingale')">View Details</button>
      </div>

      <div class="case-card" data-status="rejected">
        <h3>Shridhar Basugade</h3>
        <p>Case Type: Fraud Allegations</p>
        <p>Status: Rejected</p>
        <button onclick="viewCase('Shridhar Basugade')">View Details</button>
      </div>
    </div>
  </div>

  <script>
    function filterCases() {
      const searchInput = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const caseCards = document.querySelectorAll('.case-card');

      caseCards.forEach(card => {
        const name = card.querySelector('h3').textContent.toLowerCase();
        const status = card.dataset.status;

        const matchesSearch = name.includes(searchInput);
        const matchesStatus = statusFilter === 'all' || status === statusFilter;

        if (matchesSearch && matchesStatus) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }

    function viewCase(clientName) {
      window.location.href = `case_details.html?client=${encodeURIComponent(clientName)}`;
    }
  </script>
</body>
</html>
