<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - Advier ⚖️</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8fafc;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Decorative background elements */
        body::before {
            content: '';
            position: absolute;
            top: -20%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .login-wrapper {
            display: flex;
            flex-direction: row;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            z-index: 10;
        }
        .login-image {
            flex: 1;
            background: url('law.jpg') center/cover no-repeat;
            position: relative;
            display: none;
        }
        .login-image::after {
            content: "";
            position: absolute;
            inset: 0;
            background: transparent;
        }

        @media (min-width: 768px) {
            .login-image {
                display: block;
            }
        }
        .login-form-container {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
        }
        .login-form-container h2 {
            font-size: 2.2rem;
            color: #0f172a;
            margin-bottom: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        label {
            display: block;
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 1rem 1.2rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #0f172a;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .btn-full {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }
        .btn-full:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .auth-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.95rem;
            color: #475569;
        }
        .auth-links a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .auth-links a:hover {
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-image">
        </div>
        <div class="login-form-container">
            <h2>ADVIER</h2>
            
            <form onsubmit="return redirectToDashboard(event)">
                <div class="form-group">
                    <label for="e1">Email Address</label>
                    <input type="email" id="e1" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="p1">Password</label>
                    <input type="password" id="p1" name="password" placeholder="Enter Password" required>
                </div>

                <div class="form-group">
                    <input type="submit" class="btn btn-primary btn-full" value="Log In">
                </div>
                
                <div class="auth-links">
                    <p>New to Advier? <a href="2.lawyer_reg.html">Create an account</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast-container" class="toast-container"></div>

    <script>
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'fadeOut 0.3s forwards';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    async function redirectToDashboard(event) {
        event.preventDefault();
        const submitBtn = document.querySelector('input[type="submit"]');
        submitBtn.value = "Logging in...";
        submitBtn.disabled = true;

        const email = document.getElementById('e1').value.trim();
        const password = document.getElementById('p1').value.trim();

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('userName', result.name);
                localStorage.setItem('userEmail', result.email);
                localStorage.setItem('role', result.role);
                
                showToast("Login successful! Redirecting...", "success");

                setTimeout(() => {
                    if (result.role === 'lawyer') {
                        window.location.href = '3.lawyer_dashboard.html';
                    } else if (result.role === 'client') {
                        window.location.href = 'cdash.html';
                    } else {
                        showToast('Unknown user role', 'error');
                        submitBtn.value = "Log In";
                        submitBtn.disabled = false;
                    }
                }, 1000);
            } else {
                showToast(result.message || 'Invalid credentials', "error");
                submitBtn.value = "Log In";
                submitBtn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            showToast('Server connection failed. Is app.py running?', 'error');
            submitBtn.value = "Log In";
            submitBtn.disabled = false;
        }
    }
    </script>
</body>
</html>
