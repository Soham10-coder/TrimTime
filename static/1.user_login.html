<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - Advier</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--border-color) 100%);
            padding: 2rem;
        }
        .login-wrapper {
            display: flex;
            flex-direction: row;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
        }
        .login-image {
            flex: 1;
            background: url('law.jpg') center/cover no-repeat;
            position: relative;
            display: none;
        }
        .login-image::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 15, 15, 0.7); /* Matte Black overlay */
        }
        .login-brand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            color: var(--secondary); /* Gold */
        }
        .login-brand h1 {
            font-size: 2.5rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }
        .login-brand p {
            color: white;
            font-size: 1.1rem;
        }
        @media (min-width: 768px) {
            .login-image {
                display: block;
            }
        }
        .login-form-container {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-form-container h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .login-form-container p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
        .auth-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
        }
        .auth-links a {
            font-weight: 600;
        }
        .btn-full {
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-image">
        </div>
        <div class="login-form-container">
            <h2 style="letter-spacing: 2px;">ADVIER</h2>
            
            <form onsubmit="return redirectToDashboard(event)">
                <div class="form-group">
                    <label for="e1">Email Address</label>
                    <input type="email" id="e1" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="p1">Password</label>
                    <input type="password" id="p1" name="password" placeholder="Enter Password" required>
                </div>

                <div class="form-group">
                    <input type="submit" class="btn btn-primary btn-full" value="Log In">
                </div>
                
                <div class="auth-links">
                    <p>New to Advier? <a href="2.lawyer_reg.html">Create an account</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast-container" class="toast-container"></div>

    <script>
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'fadeOut 0.3s forwards';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    async function redirectToDashboard(event) {
        event.preventDefault();
        const submitBtn = document.querySelector('input[type="submit"]');
        submitBtn.value = "Logging in...";
        submitBtn.disabled = true;

        const email = document.getElementById('e1').value.trim();
        const password = document.getElementById('p1').value.trim();

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('userName', result.name);
                localStorage.setItem('userEmail', result.email);
                localStorage.setItem('role', result.role);
                
                showToast("Login successful! Redirecting...", "success");

                setTimeout(() => {
                    if (result.role === 'lawyer') {
                        window.location.href = '3.lawyer_dashboard.html';
                    } else if (result.role === 'client') {
                        window.location.href = 'cdash.html';
                    } else {
                        showToast('Unknown user role', 'error');
                        submitBtn.value = "Log In";
                        submitBtn.disabled = false;
                    }
                }, 1000);
            } else {
                showToast(result.message || 'Invalid credentials', "error");
                submitBtn.value = "Log In";
                submitBtn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            showToast('Server connection failed. Is app.py running?', 'error');
            submitBtn.value = "Log In";
            submitBtn.disabled = false;
        }
    }
    </script>
</body>
</html>
