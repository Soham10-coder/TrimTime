<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login Page</title>
    <link rel="stylesheet" href="1.user_login.css">
</head>
<body>

    <div id="i1">
        <img src="law.jpg" alt="Law Image" style="width: 100%; max-height: 300px; object-fit: cover;">
    </div>

    <div id="h1">
        <form onsubmit="return redirectToDashboard(event)">
            <div id="a">
                <h2>Login Form</h2>

                <label for="e1">Email</label>
                <input type="email" id="e1" name="email" placeholder="ex: abc@gmail.com" required>
                <br><br>

                <label for="p1">Password</label>
                <input type="password" id="p1" name="password" placeholder="Enter Password" required>
                <br><br>

                <p>Haven't registered? <a href="2.lawyer_reg.html">Register here</a></p>
                <input type="submit" id="s1" value="Login">
            </div>
        </form>
    </div>

    <script>
        async function redirectToDashboard(event) {
            event.preventDefault();

            const email = document.getElementById('e1').value.trim();
            const password = document.getElementById('p1').value.trim();

            if (!email || !password) {
                alert("Please enter both email and password.");
                return false;
            }

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Store in localStorage
                    localStorage.setItem('userName', result.name);
                    localStorage.setItem('userEmail', result.email);
                    localStorage.setItem('role', result.role);

                    alert("Login successful!");

                    // Redirect
                    if (result.role === 'lawyer') {
                        window.location.href = '3.lawyer_dashboard.html';
                    } else if (result.role === 'client') {
                        window.location.href = 'cdash.html';
                    } else {
                        alert('Unknown user role');
                    }
                } else {
                    alert(result.message || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Server error. Please try again later.');
            }
        }
    </script>

</body>
</html>
