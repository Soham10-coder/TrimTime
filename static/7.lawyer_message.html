<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - LegalConnect</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .chat-container {
            display: flex;
            height: calc(100vh - 220px);
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .conversations-panel {
            width: 320px;
            background: var(--bg-light);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .conversations-header {
            padding: 1.5rem;
            background: var(--primary);
            color: white;
            font-weight: 600;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }
        .conversation-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }
        .conversation-item:hover, .conversation-item.active {
            background: var(--bg-surface);
            border-left: 4px solid var(--secondary);
        }
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
        }
        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-surface);
            display: flex;
            align-items: center;
        }
        .chat-header h3 {
            margin: 0;
            color: var(--primary);
        }
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #fafafa;
        }
        .message {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            position: relative;
            font-size: 0.95rem;
        }
        .message.sent {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-bottom-left-radius: 0;
            box-shadow: var(--shadow-sm);
        }
        .timestamp {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.3rem;
            text-align: right;
        }
        .message.received .timestamp {
            color: var(--text-muted);
        }
        .chat-input-area {
            padding: 1.5rem;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            background: var(--bg-light);
        }
        .chat-input:focus {
            outline: none;
            border-color: var(--secondary);
            background: white;
        }
        .btn-send {
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .btn-send:hover {
            transform: scale(1.05);
            background: var(--secondary-hover);
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                height: calc(100vh - 160px); /* Adjust for smaller padding on mobile */
            }
            .conversations-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                flex: none;
                max-height: 150px; /* Constrain list height on mobile */
            }
            .conversations-header {
                padding: 0.8rem 1rem;
            }
            .conversation-item {
                padding: 0.8rem 1rem;
            }
            .chat-header {
                padding: 1rem;
            }
            .chat-input-area {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <div class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Messages</h1>
            </div>

            <div class="chat-container">
                <!-- Left Panel: Conversations -->
                <div class="conversations-panel">
                    <div class="conversations-header">
                        My Clients
                    </div>
                    <div class="conversations-list" id="conversationsList">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Right Panel: Chat -->
                <div class="chat-panel" id="chatPanel" style="display: none;">
                    <div class="chat-header">
                        <h3 id="currentChatName">Select a conversation</h3>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <!-- Messages go here -->
                    </div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="messageInput" placeholder="Type your message here...">
                        <button class="btn-send" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                
                <div class="chat-panel" id="emptyChatPanel">
                    <div class="empty-state">
                        <p>Select a client from the left to start messaging</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Inject unified sidebar -->
    <script src="sidebar.js"></script>
    
    <script>
        const socket = io();
        const lawyerEmail = localStorage.getItem('userEmail');
        let currentRoom = null;
        let currentClientEmail = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!lawyerEmail) {
                window.location.href = '1.user_login.html';
                return;
            }
            loadClients();
        });

        async function loadClients() {
            try {
                // Fetch appointments to get unique clients
                const response = await fetch(`/api/lawyer/appointments?lawyerEmail=${encodeURIComponent(lawyerEmail)}`);
                const appointments = await response.json();
                
                const clientsMap = new Map();
                appointments.forEach(app => {
                    const status = app.status ? app.status.toLowerCase() : '';
                    if (status === 'accepted' && app.clientEmail) {
                        clientsMap.set(app.clientEmail, app.clientName || app.clientEmail);
                    }
                });

                const list = document.getElementById('conversationsList');
                list.innerHTML = '';
                
                if (clientsMap.size === 0) {
                    list.innerHTML = '<div style="padding: 1rem; color: #666;">No active clients found.</div>';
                    return;
                }

                clientsMap.forEach((name, email) => {
                    const div = document.createElement('div');
                    div.className = 'conversation-item';
                    div.innerHTML = `<strong>${name}</strong><br><small>${email}</small>`;
                    div.onclick = () => selectChat(email, name, div);
                    list.appendChild(div);
                });
            } catch (err) {
                console.error("Error loading clients:", err);
            }
        }

        function selectChat(clientEmail, clientName, element) {
            // Update active state
            document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            currentClientEmail = clientEmail;
            
            // Generate deterministic room name
            const emails = [lawyerEmail, clientEmail].sort();
            currentRoom = `room_${emails[0]}_${emails[1]}`;

            document.getElementById('emptyChatPanel').style.display = 'none';
            document.getElementById('chatPanel').style.display = 'flex';
            document.getElementById('currentChatName').innerText = clientName;

            socket.emit('join_room', { room: currentRoom });
            loadMessages();
        }

        async function loadMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            try {
                const response = await fetch(`/api/messages/${currentRoom}`);
                const messages = await response.json();
                
                messages.forEach(msg => displayMessage(msg));
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error("Error loading messages:", err);
            }
        }

        function displayMessage(data) {
            const container = document.getElementById('chatMessages');
            const isMine = data.senderEmail === lawyerEmail;
            
            const div = document.createElement('div');
            div.className = `message ${isMine ? 'sent' : 'received'}`;
            
            let timeString = '';
            if (data.timestamp) {
                const date = new Date(data.timestamp);
                timeString = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            
            div.innerHTML = `
                <div>${data.message}</div>
                <div class="timestamp">${timeString}</div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        socket.on('receive_message', (data) => {
            displayMessage(data);
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && currentRoom) {
                socket.emit('send_message', {
                    room: currentRoom,
                    message: message,
                    sender: localStorage.getItem('userName'),
                    senderEmail: lawyerEmail
                });
                input.value = '';
            }
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
